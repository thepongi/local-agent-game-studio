<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Campus-Security-Challenge</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #scoreboard { margin-bottom: 10px; }
        canvas { border: 1px solid black; display: block; margin: auto; }
        .button-container { text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

<div id="scoreboard">
    <span id="score">Punkte: 0</span> | <span id="lives">Leben: 3</span>
</div>

<canvas id="network" width="800" height="600"></canvas>

<div class="button-container">
    <button onclick="addFirewall()">Firewall hinzufügen</button>
    <button onclick="addSecurityForce()">Sicherheitskraft hinzufügen</button>
</div>

<script>
    const canvas = document.getElementById('network');
    const ctx = canvas.getContext('2d');
    let score = 0;
    let lives = 3;

    function drawSystem(x, y) {
        ctx.beginPath();
        ctx.arc(x, y, 20, 0, Math.PI * 2);
        ctx.fillStyle = 'blue';
        ctx.fill();
        ctx.closePath();
    }

    function addFirewall() {
        // Simulate adding a firewall to a system
        updateScore(10);
    }

    function addSecurityForce() {
        // Simulate adding security force to a system
        updateScore(10);
    }

    function updateScore(points) {
        score += points;
        document.getElementById('score').innerText = 'Punkte: ' + score;
    }

    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawSystem(200, 200);
        // Add more systems and logic here
        requestAnimationFrame(gameLoop);
    }

    gameLoop();

    document.addEventListener('keydown', (e) => {
        if (e.key === 'f') addFirewall();
        if (e.key === 's') addSecurityForce();
    });
</script>

</body>
</html>
