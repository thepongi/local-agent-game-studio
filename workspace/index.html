<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Campus CyberQuest</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .network-status {
            font-size: 24px;
            color: red;
            margin-bottom: 20px;
        }
        .resources {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .resource-bar {
            width: 150px;
            height: 30px;
            background-color: #ddd;
            border-radius: 5px;
            position: relative;
        }
        .resource-fill {
            height: 100%;
            background-color: #28a745;
            border-radius: 5px;
            transition: width 0.3s;
        }
        .score {
            font-size: 20px;
            margin-bottom: 20px;
        }
        .button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Campus CyberQuest</h1>
        <button onclick="startGame()">Start Spiel</button>
        <div id="game-container" style="display:none;">
            <div id="network-status">Netzwerkstatus: 100%</div>
            <div class="resources">
                <div>
                    CPU: <span id="cpu-label">100%</span>
                    <div class="resource-bar"><div class="resource-fill" id="cpu-fill"></div></div>
                </div>
                <div>
                    Speicher: <span id="memory-label">90%</span>
                    <div class="resource-bar"><div class="resource-fill" id="memory-fill"></div></div>
                </div>
            </div>
            <button class="button" onclick="action('firewall')">Firewall</button>
            <button class="button" onclick="action('antivirus')">Anti-Virus</button>
            <button class="button" onclick="action('malware-scan')">Malware-Scan</button>
            <div class="score">Punkte: <span id="score">0</span></div>
        </div>
    </div>

    <script>
        let networkStatus = 100;
        let cpuUsage = 100;
        let memoryUsage = 90;
        let score = 0;

        function startGame() {
            document.getElementById('game-container').style.display = 'block';
            gameLoop();
        }

        function action(service) {
            if (service === 'firewall') {
                if (cpuUsage > 20) {
                    cpuUsage -= 10;
                    updateNetworkStatus();
                    alert('Firewall erfolgreich angewendet!');
                    score++;
                } else {
                    alert('Nicht genügend CPU-Ressourcen!');
                }
            } else if (service === 'antivirus') {
                if (memoryUsage > 20) {
                    memoryUsage -= 10;
                    updateNetworkStatus();
                    alert('Anti-Virus erfolgreich angewendet!');
                    score++;
                } else {
                    alert('Nicht genügend Speicher-Ressourcen!');
                }
            } else if (service === 'malware-scan') {
                if (cpuUsage > 30 && memoryUsage > 20) {
                    cpuUsage -= 15;
                    memoryUsage -= 10;
                    updateNetworkStatus();
                    alert('Malware-Scan erfolgreich angewendet!');
                    score++;
                } else {
                    alert('Nicht genügend Ressourcen!');
                }
            }

            // Zufalls-Virus-Eintritt
            if (Math.random() < 0.1) {
                networkStatus -= 5;
                updateNetworkStatus();
                alert('Neuer Virus!');
            }

            // Netzwerkstatus überprüfen
            if (networkStatus <= 0) {
                alert('Game Over! Netzwerk verloren.');
                resetGame();
            }
        }

        function updateNetworkStatus() {
            document.getElementById('network-status').innerText = 'Netzwerkstatus: ' + networkStatus + '%';
            document.getElementById('cpu').innerText = cpuUsage + '%';
            document.getElementById('memory').innerText = memoryUsage + '%';
            document.getElementById('score').innerText = score;

            const cpuFill = document.getElementById('cpu-fill');
            const memoryFill = document.getElementById('memory-fill');

            cpuFill.style.width = cpuUsage + '%';
            cpuLabel.innerText = cpuUsage + '%';

            memoryFill.style.width = memoryUsage + '%';
            memoryLabel.innerText = memoryUsage + '%';
        }

        function resetGame() {
            networkStatus = 100;
            cpuUsage = 100;
            memoryUsage = 90;
            score = 0;
            updateNetworkStatus();
            document.getElementById('game-container').style.display = 'none';
        }

        function gameLoop() {
            setTimeout(() => {
                if (networkStatus > 0) {
                    networkStatus -= Math.random() * 5;
                    cpuUsage += Math.random() * 2;
                    memoryUsage += Math.random() * 2;
                    updateNetworkStatus();
                    gameLoop();
                }
            }, 1000);
        }
    </script>
</body>
</html>
